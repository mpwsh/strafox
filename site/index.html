<!doctype html>
<html lang="en-us" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1"
    />
    <title>Strafox</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141416;
        --border: #222226;
        --text: #e8e8ea;
        --text-dim: #6b6b70;
        --perfect: #a9dc76;
        --slow: #ffd866;
        --overlap: #ff6188;
        --accent: #78dce8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        width: 100%;
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .header h1 {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.5rem 1rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: transparent;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(120, 220, 232, 0.05);
      }

      /* Main content fills remaining space */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 0;
        padding: 1rem;
      }

      /* Game tab */
      .game-tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .game-tab.hidden {
        display: none;
      }

      .game-container {
        position: relative;
        width: 100%;
        max-width: 1120px;
        aspect-ratio: 4 / 3;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        background: #000;
      }

      .game-container canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      /* Leaderboard tab */
      .leaderboard-tab {
        width: 100%;
        max-width: 1120px;
        padding: 1rem 0;
        overflow-y: auto;
        height: 100%;
      }

      .leaderboard-tab.hidden {
        display: none;
      }

      .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }

      .leaderboard-table th {
        padding: 0.75rem 1rem;
        text-align: left;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        font-weight: 400;
      }

      .leaderboard-table td {
        padding: 0.6rem 1rem;
        border-bottom: 1px solid var(--border);
      }

      .leaderboard-table tr:last-child td {
        border-bottom: none;
      }

      .leaderboard-table tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }

      .col-perfect {
        color: var(--perfect);
      }
      .col-slow {
        color: var(--slow);
      }
      .col-overlap {
        color: var(--overlap);
      }
      .col-rank {
        color: var(--text-dim);
      }

      /* Bottom bar: buttons + footer together */
      .bottom-bar {
        width: 100%;
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .controls-bar {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.75rem 0;
      }

      .footer {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        font-size: 0.6rem;
        color: var(--text-dim);
        padding: 0 1.5rem 0.75rem;
      }

      .footer a {
        color: var(--text-dim);
        text-decoration: none;
        transition: color 0.15s;
      }

      .footer a:hover {
        color: var(--accent);
      }

      /* Fullscreen: let canvas fill the screen */
      .game-container:fullscreen,
      .game-container:-webkit-full-screen,
      .game-container:-moz-full-screen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border: none;
        border-radius: 0;
      }

      @media (max-height: 700px) {
        .header {
          padding: 0.5rem 1.5rem;
        }
        .content {
          padding: 0.5rem;
        }
        .controls-bar {
          padding: 0.4rem 0;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>Strafox</h1>
    </header>

    <div class="content">
      <div class="game-tab" id="gameTab">
        <div class="game-container" id="game-container">
          <canvas
            id="loadingCanvas"
            oncontextmenu="event.preventDefault()"
            width="800"
            height="600"
          ></canvas>
          <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
        </div>
      </div>

      <div class="leaderboard-tab hidden" id="leaderboardTab">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Score</th>
              <th>Distance</th>
              <th>Perfect</th>
              <th>Slow</th>
              <th>Overlap</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <tr>
              <td
                colspan="8"
                style="
                  text-align: center;
                  padding: 1.5rem;
                  color: var(--text-dim);
                "
              >
                Loading...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="controls-bar">
        <button class="btn" id="btnFullscreen" onclick="goFullScreen();">
          Fullscreen
        </button>
        <button class="btn active" id="btnPlay" onclick="showTab('game')">
          Play
        </button>
        <button
          class="btn"
          id="btnLeaderboard"
          onclick="showTab('leaderboard')"
        >
          Leaderboard
        </button>
      </div>
      <div class="footer">
        <span>A/D move · P pause · R restart · ESC menu</span>
        <span>·</span>
        <span
          >Made with <a href="https://love2d.org/">LÖVE</a> &
          <a href="https://github.com/Davidobot/love.js">love.js</a></span
        >
      </div>
    </div>

    <script>
      function goFullScreen() {
        var container = document.getElementById("game-container");
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen)
          container.webkitRequestFullscreen();
        else if (container.mozRequestFullScreen)
          container.mozRequestFullScreen();
      }

      function showTab(tab) {
        var gameTab = document.getElementById("gameTab");
        var leaderboardTab = document.getElementById("leaderboardTab");
        var btnPlay = document.getElementById("btnPlay");
        var btnLeaderboard = document.getElementById("btnLeaderboard");
        var btnFullscreen = document.getElementById("btnFullscreen");

        if (tab === "game") {
          gameTab.classList.remove("hidden");
          leaderboardTab.classList.add("hidden");
          btnPlay.classList.add("active");
          btnLeaderboard.classList.remove("active");
          btnFullscreen.style.display = "";
        } else {
          gameTab.classList.add("hidden");
          leaderboardTab.classList.remove("hidden");
          btnPlay.classList.remove("active");
          btnLeaderboard.classList.add("active");
          btnFullscreen.style.display = "none";
          updateLeaderboard();
        }
      }
    </script>
    <script src="consolewrapper.js"></script>
    <script src="webdb.js"></script>
    <script src="utils.js"></script>
    <script src="leaderboard.js"></script>
    <script type="text/javascript" src="game.js"></script>
    <script
      async
      type="text/javascript"
      src="love.js"
      onload="applicationLoad(this)"
    ></script>
  </body>
</html>
